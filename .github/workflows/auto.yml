name: Auto News

on:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4

    - run: pip install feedparser

    - run: python scripts/news.py

    - name: Commit changes
      run: |
        git config --global user.name "worldbot"
        git config --global user.email "bot@email.com"
        git add .
        git commit -m "auto news"
        git push
